name: 🔄 更新 AdGuard Home 规则

on:
  schedule:
    - cron: "30 23 * * *"  # 每天 UTC 时间 23:30 (对应北京时间上午 7:30) 触发
  push:
    paths:
      - 'config/**'
      - 'generate_formatted_list.sh'
  workflow_dispatch:  # 支持手动触发工作流

permissions:
  contents: write  # 允许工作流创建和删除 Release 及 Tag

jobs:
  update-rules:
    runs-on: ubuntu-latest
    env:
      RULES_FILE: /tmp/adguard_home_rules.txt

    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4

    - name: ⚙️ 编译并生成规则文件
      run: |
        chmod +x generate_formatted_list.sh
        OUTPUT_FILE="$RULES_FILE" ./generate_formatted_list.sh
        
        if [ ! -f "$RULES_FILE" ]; then
          echo "🚨 致命错误：规则文件 $RULES_FILE 未能成功生成！"
          exit 1
        fi

    - name: 💾 同步配置文件至代码库
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add config/ || true
        
        if git diff --staged --quiet; then
          echo "🙈 配置文件无变更，跳过同步。"
        else
          git commit -m "chore(config): 🤖 同步最新配置文件 [skip ci]"
          git push
          echo "🚀 配置文件已成功保存至代码仓库！"
        fi

    - name: 🏷️ 生成版本与时间标签
      run: |
        # 设置时区为亚洲/上海 (北京时间)
        export TZ='Asia/Shanghai'
        
        # 将格式化后的时间保存为环境变量供下一步使用 (已移除所有 % 前面的反斜杠)
        echo "UPDATE_TIME=$(date +'\%Y-\%m-\%d \%H:\%M:\%S')" >> "$GITHUB_ENV"
        echo "TAG_NAME=rules-$(date +'\%Y\%m\%d-\%H\%M\%S')" >> "$GITHUB_ENV"
        echo "RELEASE_NAME=🚀 规则自动更新 ($(date +'\%Y-\%m-\%d'))" >> "$GITHUB_ENV"

    - name: 📦 发布至 GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_NAME }}
        files: ${{ env.RULES_FILE }}
        body: |
          ✨ **AdGuard Home 规则已成功更新！**
          
          🕒 **构建时间**: ${{ env.UPDATE_TIME }} (北京时间)
          
          ### 🔗 订阅链接 (永久最新版)
          ```text
          [https://github.com/$](https://github.com/$){{ github.repository }}/releases/latest/download/adguard_home_rules.txt
          ```
          
          💡 **使用方法**：
          将上方链接复制，并添加到 AdGuard Home 的 **过滤器 -> DNS 重写** 或 **自定义规则** 中即可。
          
          ---
          *🤖 本发布由 GitHub Actions 全自动构建并部署。*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🧹 清理旧版本 Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 增加 --limit 100 确保能拉取到历史版本
        old_tags=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep -v "^${{ env.TAG_NAME }}$")
        
        if [ -n "$old_tags" ]; then
          for tag in $old_tags; do
            echo "💥 正在移除过期版本: $tag"
            gh release delete "$tag" --cleanup-tag --yes
          done
        else
          echo "✨ 暂无旧版本需要清理。"
        fi
