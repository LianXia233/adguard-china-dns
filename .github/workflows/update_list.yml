name: 🔄 更新 AdGuard Home 规则

on:
  schedule:
    - cron: "30 23 * * *"  # 每天 UTC 时间 23:30 (对应北京时间上午 7:30) 触发
  push:
    paths:
      - 'config/**'
      - 'generate_formatted_list.sh'
  workflow_dispatch:  # 支持手动触发工作流

# 🌟 全局环境变量：强制允许兼容，压制 Node 20 弃用警告，保持 Actions 界面干净整洁
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

permissions:
  contents: write  # 允许工作流创建和删除 Release 及 Tag

jobs:
  update-rules:
    runs-on: ubuntu-latest
    env:
      RULES_FILE: /tmp/adguard_home_rules.txt

    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4

    - name: ⚙️ 编译并生成规则文件
      run: |
        chmod +x generate_formatted_list.sh
        OUTPUT_FILE="$RULES_FILE" ./generate_formatted_list.sh
        
        if [ ! -f "$RULES_FILE" ]; then
          echo "🚨 致命错误：规则文件 $RULES_FILE 未能成功生成！"
          exit 1
        fi

    - name: 💾 同步配置文件至代码库
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add config/ || true
        
        if git diff --staged --quiet; then
          echo "🙈 配置文件无变更，跳过同步。"
        else
          git commit -m "chore(config): 🤖 同步最新配置文件 [skip ci]"
          git push
          echo "🚀 配置文件已成功保存至代码仓库！"
        fi

    - name: 🏷️ 生成版本与时间标签
      run: |
        # 设置时区为亚洲/上海 (北京时间)
        export TZ='Asia/Shanghai'
        
        # 严格遵循原生 Bash 语法，拒绝任何多余的斜杠转义
        echo "UPDATE_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"
        echo "TAG_NAME=rules-$(date '+%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"
        echo "RELEASE_NAME=🚀 规则自动更新 ($(date '+%Y-%m-%d'))" >> "$GITHUB_ENV"

    - name: 📦 发布至 GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_NAME }}
        files: ${{ env.RULES_FILE }}
        body: |
          ✨ **AdGuard Home 规则已成功更新！**
          
          🕒 **构建时间**: ${{ env.UPDATE_TIME }} (北京时间)
          
          ---
          *🤖 本发布由 GitHub Actions 全自动构建并部署。*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🧹 清理旧版本 Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 严格提取非当前 Tag 的历史版本，末尾追加 || true 规避 grep 找不到匹配项时的退出码问题
        old_tags=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep -vx "${{ env.TAG_NAME }}" || true)
        
        if [ -n "$old_tags" ]; then
          for tag in $old_tags; do
            echo "🗑 正在删除 Release：$tag"
            
            # 1. 尝试删除 Release 壳子，失败也继续（兼容孤儿或已被手动干掉的 Release）
            gh release delete "$tag" --yes || true
            
            # 2. 尝试强行推送空分支到该远端 Tag 引用执行删除，静默且容错
            git push origin ":refs/tags/$tag" >/dev/null 2>&1 || true
          done
          echo "✅ 历史 Release 清理完成"
        else
          echo "✨ 暂无旧版本需要清理。"
        fi
