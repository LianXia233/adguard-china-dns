name: Update AdGuard Home Rules

on:
  schedule:
    - cron: "0 23 * * *"  # 每天 UTC 时间 23:00 对应北京时间上午 7:00 更新规则
  push:
    branches:
      - main  # 监听 main 分支的推送事件
  workflow_dispatch:  # 支持手动触发工作流

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
    # 步骤 1: 检出当前仓库的代码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 步骤 2: 确保脚本具有执行权限，并运行脚本生成规则文件
    - name: Run script to generate rules
      run: |
        chmod +x generate_formatted_list.sh
        OUTPUT_FILE="$RUNNER_TEMP/adguard_home_rules.txt" ./generate_formatted_list.sh
        echo "RULES_FILE=$RUNNER_TEMP/adguard_home_rules.txt" >> "$GITHUB_ENV"
      id: run_script  # 给此步骤一个 ID，方便后续引用

    # 步骤 3: 检查脚本执行是否成功
    - name: Check script execution status
      if: steps.run_script.outcome != 'success'
      run: |
        echo "Error: generate_formatted_list.sh script failed."
        exit 1

    # 步骤 4: 检查规则文件是否存在
    - name: Check if rules file exists
      id: check_file
      uses: andstor/file-existence-action@v2
      with:
        files: ${{ env.RULES_FILE }}

    # 步骤 5: 生成 Release 元数据
    - name: Prepare release metadata
      if: steps.check_file.outputs.files_exists == 'true' && steps.run_script.outcome == 'success'
      run: |
        echo "TAG_NAME=rules-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"
        echo "RELEASE_NAME=AdGuard Home Rules $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

    # 步骤 6: 上传规则文件到 Releases
    - name: Upload rules to release
      if: steps.check_file.outputs.files_exists == 'true' && steps.run_script.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_NAME }}
        files: ${{ env.RULES_FILE }}
        body: 自动生成的最新 AdGuard Home 规则文件。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 步骤 7: 清理历史 Releases，仅保留最新一个
    - name: Cleanup old releases
      if: steps.check_file.outputs.files_exists == 'true' && steps.run_script.outcome == 'success'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        old_tags=$(gh api "repos/${{ github.repository }}/releases" --jq '.[] | select(.tag_name != env.TAG_NAME) | .tag_name')
        if [ -n "$old_tags" ]; then
          for tag in $old_tags; do
            release_id=$(gh api "repos/${{ github.repository }}/releases/tags/$tag" --jq '.id')
            gh api -X DELETE "repos/${{ github.repository }}/releases/$release_id"
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$tag"
          done
        fi
